name: Build & Deploy Backend

on:
  push:
    branches:
      - main # prod
      - test
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
      - "compose.yaml"

jobs:
  build-backend:
    runs-on: self-hosted

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
      IMAGE_TAG: "backend-${{ github.ref_name == 'main' && 'prod' || 'test' }}:latest"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}, backend:latest

  deploy-backend:
    runs-on: self-hosted
    needs: build-backend

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Save Backend Image
        run: |
          docker save -p backend-app.tar ${{ env.IMAGE_TAG }}, backend:latest

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-app.tar
          retention-days: 1

  deploy-backend-container:
    runs-on: self-hosted
    needs: deploy-backend

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}

    steps:
      - uses: actions/checkout@v4

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: .

      - name: Load Backend Image
        run: |
          docker load -i backend-app.tar
          rm backend-app.tar

      - name: Restart Backend Service
        run: |
          docker compose up -d --no-deps --build backend

name: Build & Deploy Backend

on:
  push:
    branches:
      - main # prod
      - test
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
      - "compose.yaml"

jobs:
  build-backend:
    runs-on: self-hosted

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
      IMAGE_TAG: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}-backend:latest"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_TAG }}
          path: ${{ runner.temp }}/${{ env.IMAGE_TAG }}.tar

  deploy-backend-container:
    runs-on: self-hosted
    needs: build-backend

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      BACKEND_PORT: ${{ vars.BACKEND_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      POSTGRES_PORT: ${{ vars.POSTGRES_PORT }}
      IMAGE_TAG: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}-backend:latest"

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_TAG }}
          path: ${{ runner.temp }}/${{ env.IMAGE_TAG }}.tar

      - name: Load image
        run: |
          docker load --input ${{ runner.temp }}/${{ env.IMAGE_TAG }}.tar
          docker image ls -a
          rm ${{ runner.temp }}/${{ env.IMAGE_TAG }}.tar

      - name: Restart Backend Service
        run: |
          docker compose up -d --no-deps --build backend

name: Build & Deploy Admin Frontend

on:
  push:
    branches:
      - main # prod
      - test
    paths:
      - "admin/**"
      - ".github/workflows/admin.yml"
      - "compose.yaml"

jobs:
  build-admin:
    runs-on: self-hosted

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      ADMIN_PORT: ${{ vars.ADMIN_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      API_URL: 'http://backend:8080'
      IMAGE_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}-admin"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Admin Image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: touch file
        run: touch ${{ runner.temp }}/${{ env.IMAGE_NAME }}.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}
          path: ${{ runner.temp }}/${{ env.IMAGE_NAME }}.tar

  deploy-admin-container:
    runs-on: self-hosted
    needs: build-admin

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      ADMIN_PORT: ${{ vars.ADMIN_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      API_URL: 'http://backend:8080'
      IMAGE_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}-admin"

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}
          path: ${{ runner.temp }}/${{ env.IMAGE_NAME }}.tar

      - name: Load image
        run: |
          docker load --input ${{ runner.temp }}/${{ env.IMAGE_NAME }}.tar
          docker image ls -a
          rm ${{ runner.temp }}/${{ env.IMAGE_NAME }}.tar

      - name: Restart Admin Service
        run: |
          docker compose up -d --no-deps --build admin

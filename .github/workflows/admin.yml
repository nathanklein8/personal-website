name: Build & Deploy Admin Frontend

on:
  push:
    branches:
      - main # prod
      - test
    paths:
      - "admin/**"
      - ".github/workflows/admin.yml"
      - "compose.yaml"

jobs:
  build-admin:
    runs-on: self-hosted

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      ADMIN_PORT: ${{ vars.ADMIN_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      API_URL: 'http://backend:8080'
      IMAGE_TAG: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}-admin:latest"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Admin Image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}, admin:latest
          labels:
            - "environment=${{ github.ref_name }}"

  deploy-admin:
    runs-on: self-hosted
    needs: build-admin

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      ADMIN_PORT: ${{ vars.ADMIN_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      API_URL: 'http://backend:8080'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Save Admin Image
        run: |
          docker save -o admin-app.tar ${{ env.IMAGE_TAG }}, admin:latest

      - name: Upload admin image artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-image
          path: admin-app.tar
          retention-days: 1

  deploy-admin-container:
    runs-on: self-hosted
    needs: deploy-admin

    env:
      ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      COMPOSE_PROJECT_NAME: "pwsite-${{ github.ref_name == 'main' && 'prod' || 'test' }}"
      ADMIN_PORT: ${{ vars.ADMIN_PORT }}
      PHOTO_LIBRARY: ${{ vars.PHOTO_LIBRARY }}
      API_URL: 'http://backend:8080'

    steps:
      - uses: actions/checkout@v4

      - name: Download admin image artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-image
          path: .

      - name: Load Admin Image
        run: |
          docker load -i admin-app.tar
          rm admin-app.tar

      - name: Restart Admin Service
        run: |
          docker compose up -d --no-deps --build admin
